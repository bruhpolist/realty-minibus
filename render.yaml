databases:
  - name: realty-postgres
    databaseName: realty_minibus
    user: realty_user
    plan: basic-256mb

services:
  - type: redis
    name: realty-redis
    plan: starter
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: realty-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    plan: starter
    healthCheckPath: /ready
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realty-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: realty-redis
          property: connectionString
      - key: PORT
        value: "4000"
      - key: USD_RATE
        value: "3.3"
      - key: PRICE_MIN
        value: "990"
      - key: PRICE_MAX
        value: "1485"
      - key: MAX_LISTINGS
        value: "2000"
      - key: SCRAPE_LIMIT_PER_SOURCE
        value: "35"
      - key: POLL_INTERVAL_MS
        value: "10000"
      - key: IMAGES_DIR
        value: "../public/images"
      - key: BOT_TOKEN
        sync: false
      - key: TG_CHANNELS
        value: ""
      - key: TELEGRAM_WEBHOOK_URL
        value: ""
      - key: FRONTEND_ORIGIN
        value: "https://realty-frontend.onrender.com"
      - key: FRONTEND_ORIGINS
        value: "https://realty-frontend.onrender.com,http://localhost:3000"

  - type: worker
    name: realty-image-worker
    env: docker
    dockerfilePath: ./Dockerfile.worker
    plan: starter
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: realty-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: realty-redis
          property: connectionString
      - key: USD_RATE
        value: "3.3"
      - key: PRICE_MIN
        value: "990"
      - key: PRICE_MAX
        value: "1485"
      - key: MAX_LISTINGS
        value: "2000"
      - key: IMAGES_DIR
        value: "../public/images"

  - type: web
    name: realty-frontend
    env: docker
    dockerfilePath: ./Dockerfile.frontend
    plan: starter
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: "https://realty-backend.onrender.com"
